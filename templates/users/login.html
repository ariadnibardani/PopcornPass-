{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — PopcornPass{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-4 text-center"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h3>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-dark w-100 mt-2">Login</button>
        </form>
        <p class="text-center mt-3">No account? <a href="{% url 'register' %}">Register here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
