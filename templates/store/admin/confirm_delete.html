{% extends 'base.html' %}

{% block title %}Confirm Delete — PopcornPass{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm text-center p-5">
      <div style="font-size:3.5rem;">🗑️</div>
      <h4 class="mt-3">Delete {{ type }}?</h4>
      <p class="text-muted">
        You are about to permanently delete
        <strong>{{ object }}</strong>. This cannot be undone.
      </p>
      <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
