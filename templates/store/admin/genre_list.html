{% extends 'base.html' %}

{% block title %}Genres — PopcornPass{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="section-title mb-0">Manage Genres</h2>
  <div class="d-flex gap-2">
    <a href="{% url 'admin_genre_add' %}" class="btn btn-gold">
      <i class="bi bi-plus-circle me-1"></i>Add Genre
    </a>
    <a href="{% url 'site_admin_dashboard' %}"
       class="btn btn-outline-secondary">← Dashboard</a>
  </div>
</div>
<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="cart-table">
        <tr><th>Name</th><th>Slug</th><th>Movies</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for genre in genres %}
        <tr>
          <td class="fw-semibold">{{ genre.name }}</td>
          <td class="text-muted small">{{ genre.slug }}</td>
          <td><span class="badge bg-secondary">{{ genre.movies.count }}</span></td>
          <td>
            <div class="d-flex gap-1">
              <a href="{% url 'admin_genre_edit' genre.id %}"
                 class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil"></i>
              </a>
              <a href="{% url 'admin_genre_delete' genre.id %}"
                 class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </a>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4" class="text-center text-muted py-4">
            No genres yet.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
